<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.14 Cafetería / Paninoteca — Carta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              red:    '#d8232a',
              green:  '#1f8a4c',
              cream:  '#fdf8f1',
              dark:   '#1f1f1f',
            },
          },
        },
      },
    };
  </script>
  <style>
    :root { --nav-h: 120px; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .display-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .section-stripe {
      background: linear-gradient(90deg, #1f8a4c 0 33%, #ffffff 33% 66%, #d8232a 66% 100%);
      height: 6px;
    }
    /* Sections targeted from the sticky nav: leave a consistent gap below the
       header equal to its actual height + a small breathing room. */
    .menu-section { scroll-margin-top: calc(var(--nav-h) + 16px); }
    /* Hide scrollbar in horizontal category nav on mobile */
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-brand-cream text-brand-dark min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/95 backdrop-blur shadow-sm">
    <div class="section-stripe"></div>
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full bg-brand-dark text-white flex items-center justify-center display-font text-2xl">.14</div>
        <div>
          <h1 class="display-font text-2xl sm:text-3xl leading-none">Cafetería / Paninoteca</h1>
        </div>
      </div>
      <button id="cart-button" class="relative inline-flex items-center gap-2 bg-brand-red hover:bg-red-700 text-white px-4 py-2 rounded-full font-semibold shadow-md transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span class="hidden sm:inline">Mi pedido</span>
        <span id="cart-count" class="bg-white text-brand-red text-sm font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
      </button>
    </div>
    <!-- Category nav -->
    <nav id="category-nav" class="max-w-6xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto scroll-hide"></nav>
  </header>

  <!-- Menu container -->
  <main id="menu-container" class="max-w-6xl mx-auto px-4 pb-32 space-y-10"></main>

  <!-- Cart drawer (right side on desktop, bottom sheet on mobile) -->
  <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-40 hidden"></div>
  <aside id="cart-drawer"
         class="fixed z-50 bg-white shadow-2xl flex flex-col transition-transform duration-300
                inset-x-0 bottom-0 h-[85vh] rounded-t-3xl translate-y-full
                sm:inset-y-0 sm:right-0 sm:left-auto sm:h-full sm:w-[420px] sm:rounded-none sm:translate-y-0 sm:translate-x-full">
    <div class="p-4 border-b flex items-center justify-between bg-brand-dark text-white sm:rounded-none rounded-t-3xl">
      <h2 class="display-font text-2xl">Tu pedido</h2>
      <button id="cart-close" class="p-2 hover:bg-white/10 rounded-full transition" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    <div class="border-t p-4 space-y-3 bg-gray-50">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1" for="cart-table">Mesa / Nombre (opcional)</label>
        <input id="cart-table" type="text" placeholder="Ej. Mesa 4 ó Ana"
               class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-brand-red focus:outline-none" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1" for="cart-notes">Notas para la cocina (opcional)</label>
        <textarea id="cart-notes" rows="2" placeholder="Ej. sin cebolla, alergia al gluten…"
                  class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-brand-red focus:outline-none resize-none"></textarea>
      </div>
      <div class="flex items-center justify-between text-lg">
        <span class="font-semibold">Total</span>
        <span id="cart-total" class="display-font text-2xl text-brand-red">€0.00</span>
      </div>
      <button id="cart-submit"
              class="w-full bg-brand-green hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed
                     text-white font-bold py-3 rounded-xl shadow-md transition flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        Enviar pedido
      </button>
    </div>
  </aside>

  <!-- Toast / confirmation modal -->
  <div id="confirm-modal" class="fixed inset-0 bg-black/50 z-[60] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
      <div class="w-16 h-16 rounded-full bg-green-100 mx-auto flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-brand-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h3 class="display-font text-2xl text-brand-dark">¡Pedido enviado!</h3>
      <p class="text-gray-600 mt-2">Tu número de pedido es</p>
      <p id="confirm-code" class="display-font text-5xl text-brand-red my-2">000</p>
      <p class="text-sm text-gray-500">La cocina ya lo está revisando. ¡Gracias!</p>
      <button id="confirm-close"
              class="mt-6 w-full bg-brand-dark hover:bg-black text-white font-semibold py-2.5 rounded-lg transition">
        Cerrar
      </button>
    </div>
  </div>

  <!-- Floating mobile cart bar -->
  <div id="mobile-cart-bar"
       class="fixed bottom-0 inset-x-0 z-30 sm:hidden bg-brand-red text-white shadow-2xl translate-y-full transition-transform duration-300">
    <button id="mobile-cart-open" class="w-full flex items-center justify-between px-5 py-4">
      <span class="flex items-center gap-2 font-semibold">
        <span id="mobile-cart-count" class="bg-white text-brand-red rounded-full w-7 h-7 flex items-center justify-center font-bold">0</span>
        Ver pedido
      </span>
      <span id="mobile-cart-total" class="display-font text-xl">€0.00</span>
    </button>
  </div>

  <script src="menu-data.js"></script>
  <script src="orders-store.js"></script>
  <script>
  (function () {
    const MENU = window.MENU_DATA;
    /** Cart structure: array of { key, id, name, variant, price, quantity } */
    const cart = [];

    const formatEuro = (n) => '€' + (Math.round(n * 100) / 100).toFixed(2);

    /** SVG icons for panini bread formats (size visually communicates the format). */
    const BREAD_ICONS = {
      bocadillo: `
        <svg viewBox="0 0 36 20" class="w-9 h-5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="18" cy="11" rx="15" ry="6" fill="#eabb7d" stroke="#a8753a" stroke-width="1.2"/>
          <path d="M6 9 Q9 5 12 8"  fill="none" stroke="#8b5e2b" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M15 9 Q18 5 21 8" fill="none" stroke="#8b5e2b" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M24 9 Q27 5 30 8" fill="none" stroke="#8b5e2b" stroke-width="1.2" stroke-linecap="round"/>
        </svg>`,
      medio: `
        <svg viewBox="0 0 36 20" class="w-9 h-5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M13 5 Q26 5 26 11 Q26 17 13 17 Z" fill="#eabb7d" stroke="#a8753a" stroke-width="1.2"/>
          <ellipse cx="13" cy="11" rx="1.8" ry="6" fill="#fff3dc" stroke="#a8753a" stroke-width="1"/>
          <path d="M16 9 Q19 5 22 8" fill="none" stroke="#8b5e2b" stroke-width="1.2" stroke-linecap="round"/>
        </svg>`,
      pulguita: `
        <svg viewBox="0 0 36 20" class="w-9 h-5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="18" cy="11" rx="7" ry="5" fill="#b8794a" stroke="#5e3a1d" stroke-width="1.2"/>
          <circle cx="15.5" cy="9"    r="0.7" fill="#3a2410"/>
          <circle cx="18.5" cy="11"   r="0.7" fill="#3a2410"/>
          <circle cx="20.5" cy="8.5"  r="0.7" fill="#3a2410"/>
          <circle cx="16.5" cy="12"   r="0.6" fill="#3a2410"/>
          <circle cx="19.5" cy="13"   r="0.5" fill="#3a2410"/>
        </svg>`,
      barra: `
        <svg viewBox="0 0 36 20" class="w-9 h-5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="18" cy="11" rx="17" ry="4.5" fill="#eabb7d" stroke="#a8753a" stroke-width="1.2"/>
          <path d="M3 9.5 Q5 6.5 7 9"    fill="none" stroke="#8b5e2b" stroke-width="0.9" stroke-linecap="round"/>
          <path d="M9 9.5 Q11 6.5 13 9"  fill="none" stroke="#8b5e2b" stroke-width="0.9" stroke-linecap="round"/>
          <path d="M15 9.5 Q17 6.5 19 9" fill="none" stroke="#8b5e2b" stroke-width="0.9" stroke-linecap="round"/>
          <path d="M21 9.5 Q23 6.5 25 9" fill="none" stroke="#8b5e2b" stroke-width="0.9" stroke-linecap="round"/>
          <path d="M27 9.5 Q29 6.5 31 9" fill="none" stroke="#8b5e2b" stroke-width="0.9" stroke-linecap="round"/>
        </svg>`,
    };
    const iconFor = (fmtId) => BREAD_ICONS[fmtId] || '';

    // ---------- Render menu ----------
    const container = document.getElementById('menu-container');
    const nav = document.getElementById('category-nav');

    const sections = []; // {id, label, el}

    function addSection(id, label) {
      const sec = document.createElement('section');
      sec.id = id;
      sec.className = 'menu-section';
      container.appendChild(sec);
      sections.push({ id, label, el: sec });
      return sec;
    }

    function navButton({ id, label }) {
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = label;
      a.className = 'shrink-0 px-3 py-1.5 rounded-full bg-gray-100 hover:bg-brand-dark hover:text-white text-sm font-semibold whitespace-nowrap transition';
      return a;
    }

    // PANINI section
    const paniniSection = addSection('panini', 'Panini');
    paniniSection.innerHTML = `
      <h2 class="display-font text-4xl text-brand-dark mb-4">Panini</h2>
    `;
    const paniniGrid = document.createElement('div');
    paniniGrid.className = 'grid gap-6 md:grid-cols-2';
    paniniSection.appendChild(paniniGrid);

    MENU.panini.forEach((group) => {
      const card = document.createElement('div');
      card.className = 'bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden';
      card.innerHTML = `
        <div class="px-5 pt-4 pb-2 border-b bg-gradient-to-r from-brand-cream to-white">
          <h3 class="display-font text-2xl text-brand-dark">${group.group}</h3>
        </div>
        <ul class="divide-y"></ul>
      `;
      const ul = card.querySelector('ul');
      group.items.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'p-4';
        li.innerHTML = `
          <div class="flex items-start gap-3">
            <span class="display-font text-2xl text-brand-red w-12 shrink-0">${item.code}</span>
            <div class="flex-1 min-w-0">
              <p class="font-medium text-gray-900">${item.name}</p>
              <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-2">
                <div class="format-buttons inline-flex items-center bg-gray-50 border rounded-xl p-0.5" role="radiogroup" aria-label="Formato de pan">
                  ${MENU.paniniFormats.map((f, idx) => `
                    <button type="button"
                            data-format="${f.id}"
                            role="radio"
                            aria-checked="${idx === 0 ? 'true' : 'false'}"
                            aria-label="${f.label} — ${formatEuro(f.price)}"
                            title="${f.label} — ${formatEuro(f.price)}"
                            class="format-btn flex items-center justify-center px-1.5 py-1 rounded-lg transition
                                   ${idx === 0
                                     ? 'bg-white shadow ring-2 ring-brand-red'
                                     : 'opacity-60 hover:opacity-100 hover:bg-white'}">
                      ${iconFor(f.id)}
                    </button>
                  `).join('')}
                </div>
                <span class="text-xs leading-tight text-gray-600">
                  <span class="format-label-name font-medium">${MENU.paniniFormats[0].label}</span>
                  <span class="text-gray-300 mx-0.5">·</span>
                  <span class="format-label-price text-brand-red font-bold">${formatEuro(MENU.paniniFormats[0].price)}</span>
                </span>
                <div class="ml-auto flex items-center border rounded-full overflow-hidden bg-white">
                  <button class="qty-minus px-3 py-1 hover:bg-gray-100 text-lg" aria-label="Quitar">−</button>
                  <span class="qty-value w-8 text-center font-semibold">0</span>
                  <button class="qty-plus px-3 py-1 hover:bg-gray-100 text-lg" aria-label="Añadir">+</button>
                </div>
              </div>
            </div>
          </div>
        `;
        const valueEl    = li.querySelector('.qty-value');
        const labelName  = li.querySelector('.format-label-name');
        const labelPrice = li.querySelector('.format-label-price');
        const formatBtns = li.querySelectorAll('.format-btn');
        const itemId     = `panini-${item.code}`;
        let selectedFormat = MENU.paniniFormats[0].id;

        const getCurrentKey = () => `${itemId}__${selectedFormat}`;
        const refreshQty = () => {
          const entry = cart.find(c => c.key === getCurrentKey());
          valueEl.textContent = entry ? entry.quantity : 0;
        };

        function selectFormat(fmtId) {
          selectedFormat = fmtId;
          formatBtns.forEach((b) => {
            const sel = b.dataset.format === fmtId;
            b.setAttribute('aria-checked', sel ? 'true' : 'false');
            b.classList.toggle('bg-white',         sel);
            b.classList.toggle('shadow',           sel);
            b.classList.toggle('ring-2',           sel);
            b.classList.toggle('ring-brand-red',   sel);
            b.classList.toggle('opacity-60',       !sel);
            b.classList.toggle('hover:opacity-100',!sel);
            b.classList.toggle('hover:bg-white',   !sel);
          });
          const fmt = MENU.paniniFormats.find(f => f.id === fmtId);
          labelName.textContent  = fmt.label;
          labelPrice.textContent = formatEuro(fmt.price);
          refreshQty();
        }

        formatBtns.forEach((btn) => {
          btn.addEventListener('click', () => selectFormat(btn.dataset.format));
        });

        li.querySelector('.qty-plus').addEventListener('click', () => {
          const fmt = MENU.paniniFormats.find(f => f.id === selectedFormat);
          addToCart({
            key: getCurrentKey(),
            id: itemId,
            name: `${item.code} — ${item.name}`,
            variant: fmt.label,
            price: fmt.price,
          });
          refreshQty();
        });
        li.querySelector('.qty-minus').addEventListener('click', () => {
          decrementInCart(getCurrentKey());
          refreshQty();
        });

        li._refresh = refreshQty;
        ul.appendChild(li);
      });
      paniniGrid.appendChild(card);
    });

    // Helper for sections with simple items (montaditos with shared price, sandwiches, platos)
    function renderSimpleSection({ id, title, subtitle, sharedPrice, items }) {
      const sec = addSection(id, title);
      sec.innerHTML = `
        <div class="mb-4 flex items-baseline justify-between flex-wrap gap-2">
          <h2 class="display-font text-4xl text-brand-dark">${title}</h2>
          ${subtitle ? `<span class="text-sm text-gray-500">${subtitle}</span>` : ''}
        </div>
      `;
      const grid = document.createElement('div');
      grid.className = 'grid gap-3 sm:grid-cols-2 lg:grid-cols-3';
      sec.appendChild(grid);

      items.forEach((item) => {
        const price = sharedPrice != null ? sharedPrice : item.price;
        const card = document.createElement('div');
        card.className = 'bg-white border border-gray-100 rounded-xl shadow-sm p-4 flex flex-col';
        card.innerHTML = `
          <p class="font-medium text-gray-900 flex-1">${item.name}</p>
          <div class="mt-3 flex items-center justify-between">
            <span class="display-font text-2xl text-brand-red">${formatEuro(price)}</span>
            <div class="flex items-center border rounded-full overflow-hidden">
              <button class="qty-minus px-3 py-1 hover:bg-gray-100 text-lg" aria-label="Quitar">−</button>
              <span class="qty-value w-8 text-center font-semibold">0</span>
              <button class="qty-plus px-3 py-1 hover:bg-gray-100 text-lg" aria-label="Añadir">+</button>
            </div>
          </div>
        `;
        const valueEl = card.querySelector('.qty-value');
        const key = item.id;
        const refreshQty = () => {
          const entry = cart.find(c => c.key === key);
          valueEl.textContent = entry ? entry.quantity : 0;
        };
        card.querySelector('.qty-plus').addEventListener('click', () => {
          addToCart({ key, id: item.id, name: item.name, variant: null, price });
          refreshQty();
        });
        card.querySelector('.qty-minus').addEventListener('click', () => {
          decrementInCart(key);
          refreshQty();
        });
        card._refresh = refreshQty;
        grid.appendChild(card);
      });
    }

    renderSimpleSection({
      id: 'montaditos',
      title: MENU.montaditos.title,
      subtitle: `${MENU.montaditos.note} · ${formatEuro(MENU.montaditos.price)}`,
      sharedPrice: MENU.montaditos.price,
      items: MENU.montaditos.items,
    });

    renderSimpleSection({
      id: 'sandwiches',
      title: MENU.sandwiches.title,
      items: MENU.sandwiches.items,
    });

    renderSimpleSection({
      id: 'platos',
      title: MENU.platos.title,
      items: MENU.platos.items,
    });

    /** Section with multiple sub-groups (e.g. Bebidas: Cañas, Cervezas, Vinos, Copas). */
    function renderGroupedSection({ id, title, groups }) {
      const sec = addSection(id, title);
      sec.innerHTML = `
        <h2 class="display-font text-4xl text-brand-dark mb-4">${title}</h2>
      `;

      groups.forEach((group) => {
        const block = document.createElement('div');
        block.className = 'mb-6 last:mb-0';
        block.innerHTML = `
          <h3 class="display-font text-xl text-gray-700 mb-3 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-brand-red"></span>
            ${group.title}
          </h3>
        `;
        const grid = document.createElement('div');
        grid.className = 'grid gap-3 sm:grid-cols-2 lg:grid-cols-3';
        block.appendChild(grid);

        group.items.forEach((item) => {
          const price = item.price;
          const card = document.createElement('div');
          card.className = 'bg-white border border-gray-100 rounded-xl shadow-sm p-4 flex flex-col';
          card.innerHTML = `
            <p class="font-medium text-gray-900 flex-1">${item.name}</p>
            <div class="mt-3 flex items-center justify-between">
              <span class="display-font text-2xl text-brand-red">${formatEuro(price)}</span>
              <div class="flex items-center border rounded-full overflow-hidden">
                <button class="qty-minus px-3 py-1 hover:bg-gray-100 text-lg" aria-label="Quitar">−</button>
                <span class="qty-value w-8 text-center font-semibold">0</span>
                <button class="qty-plus px-3 py-1 hover:bg-gray-100 text-lg" aria-label="Añadir">+</button>
              </div>
            </div>
          `;
          const valueEl = card.querySelector('.qty-value');
          const key = item.id;
          const refreshQty = () => {
            const entry = cart.find(c => c.key === key);
            valueEl.textContent = entry ? entry.quantity : 0;
          };
          card.querySelector('.qty-plus').addEventListener('click', () => {
            addToCart({ key, id: item.id, name: item.name, variant: null, price });
            refreshQty();
          });
          card.querySelector('.qty-minus').addEventListener('click', () => {
            decrementInCart(key);
            refreshQty();
          });
          card._refresh = refreshQty;
          grid.appendChild(card);
        });

        sec.appendChild(block);
      });
    }

    renderGroupedSection({
      id: 'cafeteria',
      title: MENU.cafeteria.title,
      groups: MENU.cafeteria.groups,
    });

    renderGroupedSection({
      id: 'bebidas',
      title: MENU.bebidas.title,
      groups: MENU.bebidas.groups,
    });

    // Build category nav
    sections.forEach(s => nav.appendChild(navButton(s)));

    // ---------- Cart logic ----------
    function addToCart(entry) {
      const existing = cart.find(c => c.key === entry.key);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...entry, quantity: 1 });
      }
      renderCart();
    }

    function decrementInCart(key) {
      const idx = cart.findIndex(c => c.key === key);
      if (idx === -1) return;
      cart[idx].quantity -= 1;
      if (cart[idx].quantity <= 0) cart.splice(idx, 1);
      renderCart();
    }

    function removeFromCart(key) {
      const idx = cart.findIndex(c => c.key === key);
      if (idx !== -1) {
        cart.splice(idx, 1);
        renderCart();
        refreshAllQtyDisplays();
      }
    }

    function refreshAllQtyDisplays() {
      document.querySelectorAll('section [class*="qty-value"]').forEach(() => {});
      // Re-call refresh on every card we know of
      sections.forEach(({ el }) => {
        el.querySelectorAll('li, .bg-white').forEach((node) => {
          if (typeof node._refresh === 'function') node._refresh();
        });
      });
    }

    const cartItemsEl = document.getElementById('cart-items');
    const cartCountEl = document.getElementById('cart-count');
    const cartTotalEl = document.getElementById('cart-total');
    const cartSubmit  = document.getElementById('cart-submit');
    const mobileBar    = document.getElementById('mobile-cart-bar');
    const mobileCount  = document.getElementById('mobile-cart-count');
    const mobileTotal  = document.getElementById('mobile-cart-total');

    function renderCart() {
      const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
      const totalPrice = cart.reduce((s, i) => s + i.quantity * i.price, 0);
      cartCountEl.textContent  = totalItems;
      mobileCount.textContent  = totalItems;
      cartTotalEl.textContent  = formatEuro(totalPrice);
      mobileTotal.textContent  = formatEuro(totalPrice);
      cartSubmit.disabled = totalItems === 0;

      mobileBar.classList.toggle('translate-y-full', totalItems === 0);

      if (cart.length === 0) {
        cartItemsEl.innerHTML = `
          <div class="text-center text-gray-500 py-12">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17"/>
            </svg>
            <p class="mt-3">Tu pedido está vacío.</p>
            <p class="text-sm">Añade items desde la carta.</p>
          </div>`;
        return;
      }

      cartItemsEl.innerHTML = '';
      cart.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'flex items-start gap-3 bg-white border rounded-xl p-3';
        row.innerHTML = `
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-900 leading-tight">${item.name}</p>
            ${item.variant ? `<p class="text-xs text-gray-500 mt-0.5">${item.variant}</p>` : ''}
            <p class="text-sm text-brand-red font-semibold mt-1">${formatEuro(item.price)}</p>
          </div>
          <div class="flex flex-col items-end gap-2">
            <div class="flex items-center border rounded-full overflow-hidden">
              <button class="px-2 py-0.5 hover:bg-gray-100 cart-minus" aria-label="Quitar">−</button>
              <span class="w-7 text-center font-semibold text-sm">${item.quantity}</span>
              <button class="px-2 py-0.5 hover:bg-gray-100 cart-plus" aria-label="Añadir">+</button>
            </div>
            <button class="text-xs text-gray-400 hover:text-brand-red cart-remove">Eliminar</button>
          </div>
        `;
        row.querySelector('.cart-plus').addEventListener('click', () => {
          addToCart({ ...item, quantity: undefined });
          refreshAllQtyDisplays();
        });
        row.querySelector('.cart-minus').addEventListener('click', () => {
          decrementInCart(item.key);
          refreshAllQtyDisplays();
        });
        row.querySelector('.cart-remove').addEventListener('click', () => removeFromCart(item.key));
        cartItemsEl.appendChild(row);
      });
    }

    // Drawer open/close
    const drawer  = document.getElementById('cart-drawer');
    const overlay = document.getElementById('cart-overlay');
    function openDrawer() {
      overlay.classList.remove('hidden');
      drawer.classList.remove('translate-y-full', 'sm:translate-x-full');
    }
    function closeDrawer() {
      overlay.classList.add('hidden');
      drawer.classList.add('translate-y-full');
      drawer.classList.add('sm:translate-x-full');
    }
    document.getElementById('cart-button').addEventListener('click', openDrawer);
    document.getElementById('mobile-cart-open').addEventListener('click', openDrawer);
    document.getElementById('cart-close').addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);

    cartSubmit.addEventListener('click', () => {
      if (cart.length === 0) return;
      cartSubmit.disabled = true;
      cartSubmit.innerHTML = 'Enviando…';

      try {
        const order = window.OrdersStore.add({
          table: document.getElementById('cart-table').value.trim(),
          notes: document.getElementById('cart-notes').value.trim(),
          items: cart.map(c => ({
            id: c.id,
            name: c.name,
            variant: c.variant,
            quantity: c.quantity,
            price: c.price,
          })),
        });
        document.getElementById('confirm-code').textContent = order.code;
        document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('confirm-modal').classList.add('flex');
        cart.length = 0;
        document.getElementById('cart-table').value = '';
        document.getElementById('cart-notes').value = '';
        renderCart();
        refreshAllQtyDisplays();
        closeDrawer();
      } catch (e) {
        alert(e.message);
      } finally {
        cartSubmit.disabled = false;
        cartSubmit.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          Enviar pedido`;
      }
    });

    document.getElementById('confirm-close').addEventListener('click', () => {
      const m = document.getElementById('confirm-modal');
      m.classList.add('hidden');
      m.classList.remove('flex');
    });

    // Sincroniza la altura real del header con --nav-h para que el offset al
    // navegar por el menú sea consistente (el header puede crecer si la barra
    // de categorías hace wrap en pantallas estrechas).
    const stickyHeader = document.querySelector('header');
    function syncNavHeight() {
      if (!stickyHeader) return;
      document.documentElement.style.setProperty('--nav-h', stickyHeader.offsetHeight + 'px');
    }
    syncNavHeight();
    window.addEventListener('resize', syncNavHeight);
    if (typeof ResizeObserver !== 'undefined' && stickyHeader) {
      new ResizeObserver(syncNavHeight).observe(stickyHeader);
    }

    renderCart();
  })();
  </script>
</body>
</html>
