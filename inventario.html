<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.14 — Inventario / Carta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: { red: '#d8232a', green: '#1f8a4c', cream: '#fdf8f1', dark: '#1f1f1f' },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .display-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .section-stripe {
      background: linear-gradient(90deg, #1f8a4c 0 33%, #ffffff 33% 66%, #d8232a 66% 100%);
      height: 6px;
    }
    .inv-section { scroll-margin-top: 88px; }
    .inv-nav a.active { background: #1f1f1f; color: #fff; }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-brand-cream text-brand-dark min-h-screen">
  <header class="sticky top-0 z-30 bg-white/95 backdrop-blur shadow-sm">
    <div class="section-stripe"></div>
    <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full bg-brand-dark text-white flex items-center justify-center display-font text-xl">.14</div>
        <div>
          <h1 class="display-font text-2xl sm:text-3xl leading-none">Inventario</div>
          <p class="text-xs text-gray-500">Gestión de productos y características</p>
        </div>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <span id="save-status" class="text-xs font-semibold text-brand-green hidden">Guardado</span>
        <a href="/" class="text-sm font-semibold px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition" title="Carta del cliente">Ver carta</a>
        <a href="/servicio.html" class="text-sm font-semibold px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition">Servicio</a>
        <button id="btn-export" type="button" class="text-sm font-semibold px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition">Exportar JSON</button>
        <button id="btn-reset" type="button" class="text-sm font-semibold px-3 py-2 rounded-full bg-amber-100 hover:bg-amber-200 text-amber-900 transition">Restaurar carta</button>
      </div>
    </div>
    <nav id="inv-nav" class="inv-nav max-w-6xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto scroll-hide"></nav>
  </header>

  <main id="inv-main" class="max-w-6xl mx-auto px-4 pb-20 space-y-10"></main>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-brand-dark text-white text-sm font-semibold px-4 py-2 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300"></div>

  <script src="menu-data.js"></script>
  <script src="menu-store.js"></script>
  <script src="inventario-app.js"></script>
</body>
</html>
