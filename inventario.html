<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.14 — Inventario / Carta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: { red: '#d8232a', green: '#1f8a4c', cream: '#fdf8f1', dark: '#1f1f1f' },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .display-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .section-stripe {
      background: linear-gradient(90deg, #1f8a4c 0 33%, #ffffff 33% 66%, #d8232a 66% 100%);
      height: 6px;
    }
    .inv-section { scroll-margin-top: 100px; }
    .inv-nav a.active { background: #1f1f1f; color: #fff; }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .inv-product-card { transition: box-shadow 0.2s, transform 0.15s; }
    .inv-product-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .inv-add-card {
      border: 2px dashed #d1d5db;
      background: linear-gradient(135deg, #fafafa 0%, #fff 100%);
      min-height: 180px;
    }
    .inv-add-card:hover { border-color: #1f8a4c; background: #f0fdf4; }
    .inv-icon svg { width: 100%; height: 100%; }
    .icon-pick.selected { ring: 2px; ring-color: #d8232a; background: white; box-shadow: 0 0 0 2px #d8232a; }
    .inv-card-icon { width: 3.5rem; height: 3.5rem; border-radius: 1rem; }
    .cafe-expanded { animation: slideDown 0.2s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="bg-brand-cream text-brand-dark min-h-screen">
  <header class="sticky top-0 z-30 bg-white/95 backdrop-blur shadow-sm">
    <div class="section-stripe"></div>
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full bg-brand-dark text-white flex items-center justify-center display-font text-xl">.14</div>
        <div>
          <h1 class="display-font text-2xl sm:text-3xl leading-none">Inventario</h1>
          <p class="text-xs text-gray-500">Toca una tarjeta para editar · se guarda solo</p>
        </div>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <span id="save-status" class="inline-flex items-center gap-1 text-xs font-semibold text-brand-green opacity-0 transition-opacity">
          <span class="w-1.5 h-1.5 rounded-full bg-brand-green"></span> Guardado
        </span>
        <a href="/" class="text-sm font-semibold px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition">Carta</a>
        <a href="/servicio.html" class="text-sm font-semibold px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition">Servicio</a>
        <button id="btn-export" type="button" class="text-sm font-semibold px-3 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition">Exportar</button>
        <button id="btn-reset" type="button" class="text-sm font-semibold px-3 py-2 rounded-full bg-amber-100 hover:bg-amber-200 text-amber-900 transition">Restaurar</button>
      </div>
    </div>
    <nav id="inv-nav" class="inv-nav max-w-7xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto scroll-hide"></nav>
  </header>

  <main id="inv-main" class="max-w-7xl mx-auto px-4 pb-24 space-y-12"></main>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-brand-dark text-white text-sm font-semibold px-5 py-2.5 rounded-full shadow-xl opacity-0 pointer-events-none transition-opacity duration-300"></div>

  <script src="menu-data.js"></script>
  <script src="menu-store.js"></script>
  <script src="inventario-icons.js"></script>
  <script src="inventario-app.js"></script>
</body>
</html>
